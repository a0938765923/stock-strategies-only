name: Intraday Position Monitor

on:
  schedule:
    # 台灣時間 09:00 ~ 13:45（盤中）每 15 分鐘跑一次
    # UTC 對應 01:00 ~ 05:45 = cron */15 1-5
    - cron: '*/15 1-5 * * 1-5'
  workflow_dispatch:  # 允許手動觸發測試

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: uv sync

      - name: Run intraday monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: uv run python intraday_monitor.py
